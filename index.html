<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToolBox — Aiven's Workspace</title>
  <link rel="icon" href="icons/toolbox.png">
  <link rel="apple-touch-icon" href="icons/toolbox-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ToolBox">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #fafafa;
      --header-bg: rgba(250, 250, 250, 0.8);
      --text: #1d1d1f;
      --text-secondary: #86868b;
      --card-bg: #ffffff;
      --card-border: rgba(0, 0, 0, 0.06);
      --card-border-hover: rgba(0, 0, 0, 0.15);
      --card-shadow: 0 2px 8px rgba(0, 0, 0, 0.04), 0 0 1px rgba(0, 0, 0, 0.06);
      --card-shadow-hover: 0 12px 32px rgba(0, 0, 0, 0.1), 0 2px 6px rgba(0, 0, 0, 0.04);
      --divider: rgba(0, 0, 0, 0.08);
      --arrow-color: #c7c7cc;
      --esc-bg: rgba(0, 0, 0, 0.06);
      --esc-text: #86868b;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --header-bg: rgba(0, 0, 0, 0.8);
        --text: #f5f5f7;
        --text-secondary: #86868b;
        --card-bg: #1C1C1E;
        --card-border: rgba(255, 255, 255, 0.08);
        --card-border-hover: rgba(255, 255, 255, 0.2);
        --card-shadow: 0 2px 8px rgba(0, 0, 0, 0.3), 0 0 1px rgba(255, 255, 255, 0.05);
        --card-shadow-hover: 0 12px 32px rgba(0, 0, 0, 0.5), 0 2px 6px rgba(0, 0, 0, 0.2);
        --divider: rgba(255, 255, 255, 0.08);
        --arrow-color: #48484a;
        --esc-bg: rgba(255, 255, 255, 0.1);
        --esc-text: #86868b;
      }
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      height: 52px;
      min-height: 52px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: var(--header-bg);
      border-bottom: 0.5px solid var(--divider);
      z-index: 100;
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-logo {
      display: none !important;
    }

    /* App title in header - centered */
    .header-center {
      display: none;
      align-items: center;
      gap: 8px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .header-center img {
      width: 22px;
      height: 22px;
      border-radius: 6px;
    }

    .header-center span {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    /* ESC hint */
    .esc-hint {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--esc-text);
      cursor: pointer;
    }

    .esc-key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: 500;
      font-family: inherit;
      background: var(--esc-bg);
      border-radius: 4px;
      line-height: 1;
      min-width: 20px;
      letter-spacing: 0.02em;
    }

    /* Open external link button */
    .header-external {
      display: none;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      cursor: pointer;
      border-radius: 8px;
      color: var(--text-secondary);
      transition: background 0.15s, color 0.15s;
    }

    .header-external:hover {
      background: rgba(0, 0, 0, 0.05);
      color: var(--text);
    }

    @media (prefers-color-scheme: dark) {
      .header-external:hover {
        background: rgba(255, 255, 255, 0.08);
      }
    }

    .header-external svg {
      width: 15px;
      height: 15px;
    }

    /* Content area */
    .content {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* Home view */
    .home-view {
      height: 100%;
      overflow-y: auto;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .home-view.hidden {
      opacity: 0;
      transform: scale(0.96);
      pointer-events: none;
      position: absolute;
      inset: 0;
    }

    .home-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }

    /* Title section */
    .title-section {
      margin-bottom: 48px;
    }

    .title-label {
      display: none;
    }

    .title-main {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1.05;
      margin-bottom: 8px;
    }

    .title-sub {
      font-size: 16px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* Cards grid */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 56px;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 22px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      transition: transform 0.22s cubic-bezier(0.2, 0, 0, 1),
                  border-color 0.22s ease,
                  box-shadow 0.22s cubic-bezier(0.2, 0, 0, 1);
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--card-border-hover);
      box-shadow: var(--card-shadow-hover);
    }

    .card:active {
      transform: scale(0.98) translateY(0);
      transition-duration: 0.1s;
    }

    .card-icon {
      width: 52px;
      height: 52px;
      border-radius: 13px;
      object-fit: cover;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* Drag and drop */
    .card.dragging {
      opacity: 0.4;
      transform: scale(0.95);
      cursor: grabbing;
    }

    .card.drag-over {
      border-color: #007AFF;
      box-shadow: 0 0 0 2px rgba(0, 122, 255, 0.3);
    }

    .cards.drag-active .card:not(.dragging):hover {
      transform: none;
      box-shadow: var(--card-shadow);
    }

    /* Drag handle */
    .card-drag-handle {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      color: var(--arrow-color);
      opacity: 0;
      transition: opacity 0.15s;
      cursor: grab;
      user-select: none;
      z-index: 2;
    }

    .card:hover .card-drag-handle,
    .card-drag-handle:active {
      opacity: 1;
    }

    .card-drag-handle:hover {
      background: rgba(0, 0, 0, 0.05);
      color: var(--text-secondary);
    }

    @media (prefers-color-scheme: dark) {
      .card-drag-handle:hover {
        background: rgba(255, 255, 255, 0.08);
      }
    }

    .card-drag-handle svg {
      width: 14px;
      height: 14px;
    }

    /* App view (iframe) */
    .app-view {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
    }

    .app-view.active {
      display: flex;
    }

    .app-view iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: var(--bg);
    }

    /* Loading state */
    .app-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--bg);
      transition: opacity 0.3s ease;
    }

    .app-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid var(--divider);
      border-top-color: var(--text-secondary);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    .loading-text {
      font-size: 13px;
      color: var(--text-secondary);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .footer-section {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px 48px;
      width: 100%;
    }

    .footer-content {
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      opacity: 0.5;
    }

    @media (max-width: 480px) {
      .home-inner {
        padding: 32px 16px 48px;
      }

      .title-main {
        font-size: 34px;
      }

      .title-sub {
        font-size: 16px;
      }

      .title-section {
        margin-bottom: 28px;
      }

      .cards {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .card {
        padding: 16px;
        border-radius: 14px;
        align-items: center;
        flex-direction: row;
        gap: 12px;
      }

      .card-icon {
        width: 44px;
        height: 44px;
        border-radius: 11px;
        margin-bottom: 0;
        flex-shrink: 0;
      }

      .card-title {
        font-size: 15px;
        margin-bottom: 2px;
      }

      .card-desc {
        display: none;
      }

      .card-drag-handle {
        position: static;
        opacity: 0.4;
        width: 24px;
        height: 24px;
        margin-left: auto;
        flex-shrink: 0;
      }

      .header-center {
        display: none !important;
      }

      .esc-hint {
        display: none !important;
      }

      /* Hide header on mobile when app is open */
      body:has(#appView.active) header {
        display: none !important;
      }
    }

    /* Update toast */
    .update-toast {
      position: fixed;
      bottom: -80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-bg);
      border: 0.5px solid var(--divider);
      border-radius: 14px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 9999;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 14px;
      color: var(--text);
    }

    .update-toast.show {
      bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
    }

    .update-toast button {
      background: #007AFF;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .update-toast button:active {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <!-- Update toast -->
  <div class="update-toast" id="updateToast">
    <span>新版本已就绪</span>
    <button onclick="applyUpdate()">立即更新</button>
  </div>

  <header>
    <div class="header-left">
      <div class="esc-hint" id="escHint" onclick="goHome()">
        <kbd class="esc-key">esc</kbd>
        <span>返回</span>
      </div>

      <div class="header-logo" id="headerLogo" onclick="goHome()" style="display:none;"></div>
    </div>

    <div class="header-center" id="headerCenter">
      <img id="headerAppIcon" src="" alt="">
      <span id="headerAppName"></span>
    </div>

    <div class="header-right">

      <button class="header-external" id="externalBtn" onclick="openExternal()" title="在新标签页中打开">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 3H3.5A1.5 1.5 0 002 4.5v8A1.5 1.5 0 003.5 14h8a1.5 1.5 0 001.5-1.5V9"/>
          <path d="M9 2h5v5"/>
          <path d="M14 2L7 9"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="content">
    <div class="home-view" id="homeView">
      <div class="home-inner">
        <div class="title-section">
          <p class="title-label">Aiven's Workspace</p>
          <h1 class="title-main">ToolBox</h1>
          <p class="title-sub" id="titleSub">4 apps, one place.</p>
        </div>

        <div class="cards" id="cardsGrid"></div>

        <div class="footer-section">
          <div class="footer-content">
            <span>v1.5.1</span>
          </div>
        </div>
      </div>
    </div>

    <div class="app-view" id="appView">
      <div class="app-loading" id="appLoading">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Loading...</div>
      </div>
      <iframe id="appFrame" src="about:blank"></iframe>
    </div>
  </div>

  <script>
    let currentUrl = '';
    let isAppOpen = false;

    // App data
    const appData = [
      { id: 'cyberfortunegod', url: 'https://cyberfortunegod.vercel.app/', name: 'Cyber Fortune God', icon: 'icons/cyberfortunegod.png', desc: 'AI 智能记账，加拿大生活场景，夫妻共用', tag: '财务管理', tagClass: 'tag-finance' },
      { id: 'postagent', url: 'https://post-agent-rho.vercel.app/', name: 'Post Agent', icon: 'icons/postagent.png', desc: '社媒内容批量生成，自动排程，多平台发布', tag: '社交媒体', tagClass: 'tag-social' },
      { id: 'soloceo', url: 'https://soloceo.github.io/solo-ceo/', name: 'Solo CEO', icon: 'icons/soloceo.png', desc: '独立创业者工作台，任务、客户、专注一体', tag: '工作管理', tagClass: 'tag-work' },
      { id: 'justdoit', url: 'https://just-do-it-snowy.vercel.app/', name: 'Just Do It', icon: 'icons/justdoit.png', desc: '任务看板，拖拽管理，专注执行', tag: '任务管理', tagClass: 'tag-task' },
      { id: 'rbgtracker', url: 'https://rbg-tracker.vercel.app/', name: 'RBG Tracker', icon: 'icons/rbgtracker.png', desc: '复古游戏机转售追踪，库存、销售、利润一目了然', tag: '经营管理', tagClass: 'tag-biz' },
      { id: 'aicounter', url: 'https://aivendesigns-pixel.github.io/ai-counter/', name: 'AI Counter', icon: 'icons/aicounter.png', desc: '根据场景给人头计数，支持零和模式', tag: '工具', tagClass: 'tag-work' }
    ];

    function getOrder() {
      try {
        const saved = localStorage.getItem('toolbox-order');
        if (saved) {
          const order = JSON.parse(saved);
          if (Array.isArray(order) && order.length === appData.length) return order;
        }
      } catch(e) {}
      return appData.map(a => a.id);
    }

    function saveOrder(order) {
      localStorage.setItem('toolbox-order', JSON.stringify(order));
    }

    function renderCards() {
      const grid = document.getElementById('cardsGrid');
      const order = getOrder();
      grid.innerHTML = '';

      order.forEach(function(id) {
        const app = appData.find(a => a.id === id);
        if (!app) return;

        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.id = app.id;
        card.innerHTML =
          '<img class="card-icon" src="' + app.icon + '" alt="' + app.name + '">' +
          '<div class="card-info">' +
            '<div class="card-title">' + app.name + '</div>' +
            '<div class="card-desc">' + app.desc + '</div>' +
          '</div>' +
          '<div class="card-drag-handle" title="拖拽排序">' +
            '<svg viewBox="0 0 16 16" fill="currentColor"><circle cx="5" cy="3.5" r="1.2"/><circle cx="11" cy="3.5" r="1.2"/><circle cx="5" cy="8" r="1.2"/><circle cx="11" cy="8" r="1.2"/><circle cx="5" cy="12.5" r="1.2"/><circle cx="11" cy="12.5" r="1.2"/></svg>' +
          '</div>';

        // Click to open
        card.addEventListener('click', function(e) {
          if (e.target.closest('.card-drag-handle')) return;
          openApp(app.id, app.url, app.name, app.icon);
        });

        // Drag handle only
        const handle = card.querySelector('.card-drag-handle');
        handle.draggable = true;

        handle.addEventListener('dragstart', function(e) {
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', app.id);
          // Use card as drag image
          e.dataTransfer.setDragImage(card, card.offsetWidth / 2, card.offsetHeight / 2);
          card.classList.add('dragging');
          grid.classList.add('drag-active');
        });

        card.addEventListener('dragend', function() {
          card.classList.remove('dragging');
          grid.classList.remove('drag-active');
          grid.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
        });

        card.addEventListener('dragover', function(e) {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          if (!card.classList.contains('dragging')) {
            card.classList.add('drag-over');
          }
        });

        card.addEventListener('dragleave', function() {
          card.classList.remove('drag-over');
        });

        card.addEventListener('drop', function(e) {
          e.preventDefault();
          card.classList.remove('drag-over');
          const fromId = e.dataTransfer.getData('text/plain');
          const toId = app.id;
          if (fromId === toId) return;

          const order = getOrder();
          const fromIdx = order.indexOf(fromId);
          const toIdx = order.indexOf(toId);
          order.splice(fromIdx, 1);
          order.splice(toIdx, 0, fromId);
          saveOrder(order);
          renderCards();
        });

        grid.appendChild(card);
      });
    }

    // Touch drag support for mobile
    (function() {
      let dragEl = null, placeholder = null, startX, startY, offsetX, offsetY;

      document.addEventListener('touchstart', function(e) {
        const handle = e.target.closest('.card-drag-handle');
        if (!handle) return;
        dragEl = handle.closest('.card');
        if (!dragEl) return;

        const rect = dragEl.getBoundingClientRect();
        const touch = e.touches[0];
        offsetX = touch.clientX - rect.left;
        offsetY = touch.clientY - rect.top;
        startX = touch.clientX;
        startY = touch.clientY;

        e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchmove', function(e) {
        if (!dragEl) return;
        e.preventDefault();

        const touch = e.touches[0];

        if (!placeholder) {
          if (Math.abs(touch.clientX - startX) + Math.abs(touch.clientY - startY) < 8) return;
          placeholder = dragEl.cloneNode(true);
          placeholder.style.opacity = '0.3';
          placeholder.style.pointerEvents = 'none';
          dragEl.parentNode.insertBefore(placeholder, dragEl);

          dragEl.style.position = 'fixed';
          dragEl.style.zIndex = '1000';
          dragEl.style.width = dragEl.offsetWidth + 'px';
          dragEl.style.margin = '0';
          dragEl.style.boxShadow = '0 12px 40px rgba(0,0,0,0.2)';
          dragEl.style.transform = 'scale(1.04)';
        }

        dragEl.style.left = (touch.clientX - offsetX) + 'px';
        dragEl.style.top = (touch.clientY - offsetY) + 'px';

        const grid = document.getElementById('cardsGrid');
        const cards = Array.from(grid.querySelectorAll('.card')).filter(c => c !== dragEl);
        cards.forEach(c => c.classList.remove('drag-over'));

        const over = document.elementFromPoint(touch.clientX, touch.clientY);
        const overCard = over ? over.closest('.card') : null;
        if (overCard && overCard !== dragEl && overCard !== placeholder) {
          overCard.classList.add('drag-over');
        }
      }, { passive: false });

      document.addEventListener('touchend', function() {
        if (!dragEl) return;

        const grid = document.getElementById('cardsGrid');
        const overCard = grid.querySelector('.card.drag-over');

        if (overCard && placeholder) {
          const fromId = dragEl.dataset.id;
          const toId = overCard.dataset.id;
          const order = getOrder();
          const fromIdx = order.indexOf(fromId);
          const toIdx = order.indexOf(toId);
          order.splice(fromIdx, 1);
          order.splice(toIdx, 0, fromId);
          saveOrder(order);
        }

        // Clean up
        dragEl.style.position = '';
        dragEl.style.zIndex = '';
        dragEl.style.width = '';
        dragEl.style.left = '';
        dragEl.style.top = '';
        dragEl.style.margin = '';
        dragEl.style.boxShadow = '';
        dragEl.style.transform = '';
        if (placeholder) placeholder.remove();
        placeholder = null;
        dragEl = null;

        renderCards();
      });
    })();

    function openApp(id, url, name, icon, fromPopstate) {
      currentUrl = url;
      isAppOpen = true;

      document.getElementById('headerLogo').style.display = 'none';
      document.getElementById('escHint').style.display = 'flex';
      document.getElementById('headerCenter').style.display = 'flex';
      document.getElementById('externalBtn').style.display = 'flex';
      document.getElementById('headerAppIcon').src = icon;
      document.getElementById('headerAppName').textContent = name;

      document.getElementById('homeView').classList.add('hidden');
      document.getElementById('appView').classList.add('active');

      const loading = document.getElementById('appLoading');
      loading.classList.remove('hidden');
      document.getElementById('loadingText').textContent = name;

      const frame = document.getElementById('appFrame');
      // Use location.replace to avoid adding iframe history entries
      try {
        frame.contentWindow.location.replace(url);
      } catch(e) {
        frame.src = url;
      }
      frame.onload = function() { loading.classList.add('hidden'); };

      document.title = name + ' \u2014 ToolBox';
      if (!fromPopstate) {
        history.pushState({ app: id, url, name, icon }, '', '#' + id);
      }
    }

    function goHome(fromPopstate) {
      if (!isAppOpen) return;
      isAppOpen = false;
      currentUrl = '';

      document.getElementById('escHint').style.display = 'none';
      document.getElementById('headerCenter').style.display = 'none';
      document.getElementById('externalBtn').style.display = 'none';

      document.getElementById('homeView').classList.remove('hidden');
      document.getElementById('appView').classList.remove('active');
      document.getElementById('appFrame').src = 'about:blank';

      document.title = 'ToolBox \u2014 Aiven\'s Workspace';
      if (!fromPopstate && location.hash) {
        history.back();
      }
    }

    function openExternal() {
      if (currentUrl) window.open(currentUrl, '_blank');
    }

    // ESC key — works on parent document
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && isAppOpen) { e.preventDefault(); goHome(); }
    });

    // Fix: when iframe steals focus, parent can't catch keydown.
    // Solution: any mousemove on parent document (which only fires
    // when mouse is OUTSIDE the cross-origin iframe) refocuses the
    // parent window so ESC works from the header area.
    document.addEventListener('mousemove', function() {
      if (isAppOpen && !document.hasFocus()) {
        window.focus();
      }
    });

    // Also refocus on header hover/click for reliability
    document.querySelector('header').addEventListener('mouseenter', function() {
      if (isAppOpen) window.focus();
    });

    window.addEventListener('popstate', function(e) {
      if (isAppOpen) {
        // Any back navigation while app is open → go home
        goHome(true);
        if (location.hash) {
          history.replaceState({}, '', location.pathname);
        }
      } else if (e.state && e.state.app) {
        openApp(e.state.app, e.state.url, e.state.name, e.state.icon, true);
      }
    });

    window.addEventListener('DOMContentLoaded', function() {
      renderCards();
      // Sync count with appData
      document.getElementById('titleSub').textContent = appData.length + ' apps, one place.';
      const hash = location.hash.slice(1);
      if (hash) {
        const app = appData.find(a => a.id === hash);
        if (app) openApp(app.id, app.url, app.name, app.icon);
      }

      // Register Service Worker & detect updates
      if ('serviceWorker' in navigator) {
        var waitingSW = null;

        navigator.serviceWorker.register('sw.js').then(function(reg) {
          // Check for updates on load
          reg.addEventListener('updatefound', function() {
            var newSW = reg.installing;
            newSW.addEventListener('statechange', function() {
              if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                // New version available
                waitingSW = newSW;
                document.getElementById('updateToast').classList.add('show');
              }
            });
          });
        }).catch(function() {});

        // Reload when new SW takes over
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          window.location.reload();
        });

        window.applyUpdate = function() {
          if (waitingSW) {
            waitingSW.postMessage('skipWaiting');
          }
        };
      }
    });
  </script>
</body>
</html>
